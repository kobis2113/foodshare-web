# Forward to host's HTTP service on port 3002
upstream backend_upstream {
  server host.docker.internal:3001;
  keepalive 16;
}

# Plain HTTP: just redirect everything to HTTPS
server {
  listen 80;
  server_name _;

  return 301 https://$host$request_uri;
}

# HTTPS server: terminate TLS and proxy to backend
server {
  listen 443 ssl http2;
  server_name _;

  # TLS cert and key inside the container (see docker-compose volume)
  ssl_certificate     /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  client_max_body_size 15m;

  # Security headers (safe for APIs)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_pass http://backend_upstream;
  }
}
