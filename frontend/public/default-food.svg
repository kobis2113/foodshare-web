<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#F5F5F5"/>
  <!-- Plate -->
  <ellipse cx="200" cy="150" rx="100" ry="30" fill="#E0E0E0"/>
  <ellipse cx="200" cy="145" rx="85" ry="25" fill="#EEEEEE"/>
  <!-- Fork -->
  <g transform="translate(120, 80)">
    <rect x="0" y="40" width="4" height="60" fill="#BDBDBD"/>
    <rect x="-3" y="0" width="3" height="35" fill="#BDBDBD"/>
    <rect x="2" y="0" width="3" height="35" fill="#BDBDBD"/>
    <rect x="7" y="0" width="3" height="35" fill="#BDBDBD"/>
  </g>
  <!-- Knife -->
