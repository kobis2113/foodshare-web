  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # - "80:80"
      - "443:443"
    # Reach host's localhost from inside container (Linux: host-gateway; Win/Mac: host.docker.internal)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Mount TLS certificates for HTTPS (see nginx/conf.d/app.conf)
      # Expecting files like fullchain.pem and privkey.pem inside ./nginx/certs
      - /etc/nginx/certs:/etc/nginx/certs:ro
      # If you want nginx to serve uploads directly (optional), also mount:
      # - backend_uploads:/var/www/uploads:ro

volumes:
  backend_uploads:
