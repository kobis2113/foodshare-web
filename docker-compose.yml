services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend.env
    environment:
      # Ensure prod defaults even if .env forgot
      NODE_ENV: production
      PORT: 3000
      UPLOAD_DIR: uploads
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "80:80"
      # If you terminate TLS at nginx in-container, uncomment and mount certs.
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # If you want nginx to serve uploads directly (optional), also mount:
      # - backend_uploads:/var/www/uploads:ro

volumes:
  backend_uploads:
